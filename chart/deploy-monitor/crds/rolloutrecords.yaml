apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: rolloutrecords.deploy-monitor.io
spec:
  group: deploy-monitor.io
  names:
    kind: RolloutRecord
    listKind: RolloutRecordList
    plural: rolloutrecords
    singular: rolloutrecord
    shortNames:
      - rr
  scope: Namespaced
  versions:
    - name: v1alpha1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              required: ["clusterID", "clusterName", "namespace", "deployment", "oldTemplateHash", "newTemplateHash", "detectedAt"]
              properties:
                clusterID:
                  type: string
                clusterName:
                  type: string
                namespace:
                  type: string
                deployment:
                  type: string
                oldImages:
                  type: array
                  items:
                    type: string
                newImages:
                  type: array
                  items:
                    type: string
                oldTemplateHash:
                  type: string
                newTemplateHash:
                  type: string
                detectedAt:
                  type: string
                  format: date-time
            status:
              type: object
              properties:
                phase:
                  type: string
                  enum: ["Detected", "Processing", "Dispatched", "Investigated", "Failed"]
                dispatchedAt:
                  type: string
                  format: date-time
                dispatchTargets:
                  type: array
                  items:
                    type: string
                error:
                  type: string
      additionalPrinterColumns:
        - name: Cluster
          type: string
          jsonPath: .spec.clusterName
        - name: Namespace
          type: string
          jsonPath: .spec.namespace
        - name: Deployment
          type: string
          jsonPath: .spec.deployment
        - name: Phase
          type: string
          jsonPath: .status.phase
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
      subresources:
        status: {}
