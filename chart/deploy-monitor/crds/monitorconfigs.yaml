apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: monitorconfigs.deploy-monitor.io
spec:
  group: deploy-monitor.io
  names:
    kind: MonitorConfig
    listKind: MonitorConfigList
    plural: monitorconfigs
    singular: monitorconfig
    shortNames:
      - mc
  scope: Cluster
  versions:
    - name: v1alpha1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              properties:
                namespaceAllowlist:
                  type: array
                  items:
                    type: string
                namespaceDenylist:
                  type: array
                  items:
                    type: string
            status:
              type: object
              properties:
                active:
                  type: boolean
                lastApplied:
                  type: string
                  format: date-time
      additionalPrinterColumns:
        - name: Active
          type: boolean
          jsonPath: .status.active
        - name: Last Applied
          type: date
          jsonPath: .status.lastApplied
      subresources:
        status: {}
