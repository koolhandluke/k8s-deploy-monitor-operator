apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: clusterrolloutstates.deploy-monitor.io
spec:
  group: deploy-monitor.io
  names:
    kind: ClusterRolloutState
    listKind: ClusterRolloutStateList
    plural: clusterrolloutstates
    singular: clusterrolloutstate
    shortNames:
      - crs
  scope: Namespaced
  versions:
    - name: v1alpha1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              required: ["clusterID"]
              properties:
                clusterID:
                  type: string
                templateHashes:
                  type: object
                  additionalProperties:
                    type: string
            status:
              type: object
              properties:
                trackedDeployments:
                  type: integer
                lastSyncTime:
                  type: string
                  format: date-time
      additionalPrinterColumns:
        - name: Cluster
          type: string
          jsonPath: .spec.clusterID
        - name: Deployments
          type: integer
          jsonPath: .status.trackedDeployments
        - name: Last Sync
          type: date
          jsonPath: .status.lastSyncTime
      subresources:
        status: {}
