image:
  repository: ghcr.io/koolhandluke/k8s-deploy-monitor-operator
  tag: latest
  pullPolicy: IfNotPresent

kubeconfig:
  configMapName: ""  # name of ConfigMap containing kubeconfig files (one key per cluster)

dispatch:
  mode: log  # log | holmes | slack | both
  holmesApiUrl: ""
  slackWebhookUrl: ""

namespaceFilter:
  allowlist: []
  denylist:
    - kube-system
    - kube-public
    - kube-node-lease

persistence:
  enabled: true
  namespace: ""  # defaults to release namespace

tuning:
  workerCount: 3
  debounceSeconds: 30
  queueMaxSize: 100

resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 200m
    memory: 128Mi

serviceAccount:
  create: true
  name: ""

namespace:
  create: false

logging:
  debug: false
  trace: false  # investigation pipeline detail (implies debug)
  statusAPIPort: 8081  # only active when trace=true

investigation:
  mode: none       # none | runbook | holmes
  maxConcurrent: 10

dispatcher:
  enabled: false   # opt-in, existing users unaffected
  replicas: 1
  ttlDays: 7
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 128Mi
