{{- if .Values.dispatcher.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "deploy-monitor.fullname" . }}-dispatcher
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "deploy-monitor.labels" . | nindent 4 }}
    app.kubernetes.io/component: dispatcher
spec:
  replicas: {{ .Values.dispatcher.replicas }}
  selector:
    matchLabels:
      {{- include "deploy-monitor.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: dispatcher
  template:
    metadata:
      labels:
        {{- include "deploy-monitor.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: dispatcher
    spec:
      serviceAccountName: {{ include "deploy-monitor.fullname" . }}-dispatcher
      containers:
        - name: dispatcher
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["rollout-dispatcher"]
          env:
            - name: DISPATCH_MODE
              value: {{ .Values.dispatch.mode | quote }}
            {{- if .Values.dispatch.holmesApiUrl }}
            - name: HOLMES_API_URL
              value: {{ .Values.dispatch.holmesApiUrl | quote }}
            {{- end }}
            {{- if .Values.dispatch.slackWebhookUrl }}
            - name: SLACK_WEBHOOK_URL
              value: {{ .Values.dispatch.slackWebhookUrl | quote }}
            {{- end }}
            - name: WORKER_COUNT
              value: {{ .Values.tuning.workerCount | quote }}
            - name: PERSISTENCE_NAMESPACE
              value: {{ default .Release.Namespace .Values.persistence.namespace | quote }}
            - name: ROLLOUT_RECORD_TTL_DAYS
              value: {{ .Values.dispatcher.ttlDays | quote }}
          resources:
            {{- toYaml .Values.dispatcher.resources | nindent 12 }}
{{- end }}
