apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "deploy-monitor.fullname" . }}
  labels:
    {{- include "deploy-monitor.labels" . | nindent 4 }}
rules:
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["deploy-monitor.io"]
    resources: ["monitorconfigs"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["deploy-monitor.io"]
    resources: ["monitorconfigs/status"]
    verbs: ["get", "update", "patch"]
  {{- if .Values.persistence.enabled }}
  - apiGroups: ["deploy-monitor.io"]
    resources: ["clusterrolloutstates", "rolloutrecords"]
    verbs: ["get", "list", "create", "update", "patch"]
  - apiGroups: ["deploy-monitor.io"]
    resources: ["clusterrolloutstates/status", "rolloutrecords/status"]
    verbs: ["get", "update", "patch"]
  {{- end }}
