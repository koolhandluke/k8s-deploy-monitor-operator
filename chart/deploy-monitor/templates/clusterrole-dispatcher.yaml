{{- if .Values.dispatcher.enabled }}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "deploy-monitor.fullname" . }}-dispatcher
  labels:
    {{- include "deploy-monitor.labels" . | nindent 4 }}
    app.kubernetes.io/component: dispatcher
rules:
  - apiGroups: ["deploy-monitor.io"]
    resources: ["rolloutrecords"]
    verbs: ["get", "list", "watch", "update", "patch", "delete"]
  - apiGroups: ["deploy-monitor.io"]
    resources: ["rolloutrecords/status"]
    verbs: ["get", "update", "patch"]
{{- end }}
