apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: clusterrolloutstates.deploy-monitor.io
spec:
  group: deploy-monitor.io
  names:
    kind: ClusterRolloutState
    listKind: ClusterRolloutStateList
    plural: clusterrolloutstates
    singular: clusterrolloutstate
    shortNames:
      - crs
  scope: Namespaced
  versions:
    - name: v1alpha1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              required: ["clusterID"]
              properties:
                clusterID:
                  type: string
                templateHashes:
                  type: object
                  additionalProperties:
                    type: string
            status:
              type: object
              properties:
                trackedDeployments:
                  type: integer
                lastSyncTime:
                  type: string
                  format: date-time
      additionalPrinterColumns:
        - name: Cluster
          type: string
          jsonPath: .spec.clusterID
        - name: Deployments
          type: integer
          jsonPath: .status.trackedDeployments
        - name: Last Sync
          type: date
          jsonPath: .status.lastSyncTime
      subresources:
        status: {}
---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: rolloutrecords.deploy-monitor.io
spec:
  group: deploy-monitor.io
  names:
    kind: RolloutRecord
    listKind: RolloutRecordList
    plural: rolloutrecords
    singular: rolloutrecord
    shortNames:
      - rr
  scope: Namespaced
  versions:
    - name: v1alpha1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              required: ["clusterID", "clusterName", "namespace", "deployment", "oldTemplateHash", "newTemplateHash", "detectedAt"]
              properties:
                clusterID:
                  type: string
                clusterName:
                  type: string
                namespace:
                  type: string
                deployment:
                  type: string
                oldImages:
                  type: array
                  items:
                    type: string
                newImages:
                  type: array
                  items:
                    type: string
                oldTemplateHash:
                  type: string
                newTemplateHash:
                  type: string
                detectedAt:
                  type: string
                  format: date-time
            status:
              type: object
              properties:
                phase:
                  type: string
                  enum: ["Detected", "Dispatched", "Investigated", "Failed"]
                dispatchedAt:
                  type: string
                  format: date-time
                dispatchTargets:
                  type: array
                  items:
                    type: string
                error:
                  type: string
      additionalPrinterColumns:
        - name: Cluster
          type: string
          jsonPath: .spec.clusterName
        - name: Namespace
          type: string
          jsonPath: .spec.namespace
        - name: Deployment
          type: string
          jsonPath: .spec.deployment
        - name: Phase
          type: string
          jsonPath: .status.phase
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
      subresources:
        status: {}
---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: monitorconfigs.deploy-monitor.io
spec:
  group: deploy-monitor.io
  names:
    kind: MonitorConfig
    listKind: MonitorConfigList
    plural: monitorconfigs
    singular: monitorconfig
    shortNames:
      - mc
  scope: Cluster
  versions:
    - name: v1alpha1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              properties:
                namespaceAllowlist:
                  type: array
                  items:
                    type: string
                namespaceDenylist:
                  type: array
                  items:
                    type: string
            status:
              type: object
              properties:
                active:
                  type: boolean
                lastApplied:
                  type: string
                  format: date-time
      additionalPrinterColumns:
        - name: Active
          type: boolean
          jsonPath: .status.active
        - name: Last Applied
          type: date
          jsonPath: .status.lastApplied
      subresources:
        status: {}
